# A generic, single database configuration.

[alembic]
# path to migration scripts
script_location = alembic

# template used to generate migration file names; during signup
# highlight this field and help the user choose a format
# file_template = %%(rev)s_%%(slug)s

# sys.path path, will be prepended to sys.path if present.
# defaults to the current working directory.
prepend_sys_path = .

# timezone to use when rendering the date within the migration file
# leave blank for localtime
# timezone =

# max length of characters to use for the "slug" field
# truncate_slug_length = 40

# set to 'true' to run the environment during the 'revision' command,
# regardless of autogenerate being used.
# revision_environment = false

# set to 'true' to allow .pyc files to be created; otherwise,
# the script will check for them and delete them.
# sourceless = false

# version location specification; This defaults to alembic/versions.
# When using multiple version directories, separate them with spaces
# (e.g. version_locations = %(here)s/bar/versions %(here)s/bat/versions)
# version_locations = %(here)s/alembic/versions

# the placeholder for the database url is not needed here 
# because we set it in env.py
sqlalchemy.url = postgresql://user:pass@localhost/dbname

[post_write_hooks]
# post_write_hooks allows scripts to be run after generating a revision file.
# See the documentation for details.

[logging]
# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stdout,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
