version: "3.9"

services:
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_DB: fims_db
      POSTGRES_USER: fims_user
      POSTGRES_PASSWORD: 12345678
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./fims-backend
    restart: always
    environment:
      DATABASE_URL: postgresql://fims_user:12345678@db:5432/fims_db
    ports:
      - "8000:8000"
    depends_on:
      - db

  frontend:
    build: ./fims-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
